services:
  - type: web
    name: rive-lipsync-previewer
    runtime: node
    plan: free
    # Root deps without scripts, then explicitly build Vite → web/dist (gitignored).
    # package.json postinstall also runs scripts/build-web.mjs for dashboard
    # services still configured with plain `npm install`.
    buildCommand: npm ci --ignore-scripts && node scripts/build-web.mjs && test -f web/dist/index.html
    startCommand: node server.mjs
    envVars:
      - key: NODE_VERSION
        value: "20"
